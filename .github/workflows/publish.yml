name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write   # required for OIDC trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm 11.5.1+
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        run: node -e "const p=require('./package.json'); if (process.env.GITHUB_REF_NAME !== 'v' + p.version) { throw new Error('Tag ' + process.env.GITHUB_REF_NAME + ' does not match package version v' + p.version); }"

      - name: Test CLI
        run: npm test

      - name: Test packed CLI
        run: npm run test:package

      - name: Publish to npm
        run: npm publish --access public
